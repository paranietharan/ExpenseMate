services:
  # --- INFRASTRUCTURE SERVICES ---
  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER:-auth_user}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth_password}
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_db}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  expense-db:
    image: postgres:15-alpine
    container_name: expense-db
    environment:
      POSTGRES_USER: ${EXPENSE_DB_USER:-expense_user}
      POSTGRES_PASSWORD: ${EXPENSE_DB_PASSWORD:-expense_password}
      POSTGRES_DB: ${EXPENSE_DB_NAME:-expense_db}
    volumes:
      - expense_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server --requirepass "${REDIS_PASSWORD:-redis_password}" --save 60 1 --loglevel warning
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-broker
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-RabbitMQPassword@1234}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BACKEND MICROSERVICES ---
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      PORT: 8081
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: ${AUTH_DB_USER:-auth_user}
      DB_PASSWORD: ${AUTH_DB_PASSWORD:-auth_password}
      DB_NAME: ${AUTH_DB_NAME:-auth_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-RabbitMQPassword@1234}
      RABBITMQ_QUEUE: auth_notifications
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  expense-service:
    build:
      context: ./expense-service
      dockerfile: Dockerfile
    container_name: expense-service
    environment:
      PORT: 8082
      DB_HOST: expense-db
      DB_PORT: 5432
      DB_USER: ${EXPENSE_DB_USER:-expense_user}
      DB_PASSWORD: ${EXPENSE_DB_PASSWORD:-ExpensePassword@1234}
      DB_NAME: ${EXPENSE_DB_NAME:-expense_db}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-RabbitMQPassword@1234}
      RABBITMQ_QUEUE: auth_notifications
    restart: unless-stopped
    depends_on:
      expense-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      AUTH_SERVICE_URL: http://auth-service:8081
      EXPENSE_SERVICE_URL: http://expense-service:8082
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      expense-service:
        condition: service_started

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    env_file:
      - ./notification-service/.env
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-RabbitMQPassword@1234}
      EXPENSE_SERVICE_URL: http://expense-service:8082
    restart: unless-stopped
    volumes:
      - ./notification-service/outbox:/app/outbox
    depends_on:
      rabbitmq:
        condition: service_healthy
      expense-service:
        condition: service_started

  # --- WEB FRONTEND ---
  expense-mate-web:
    build:
      context: ./expense-mate-web
      dockerfile: Dockerfile
    container_name: expense-mate-web
    ports:
      - "3000:3000"
    environment:
      GATEWAY_URL: http://api-gateway:8080
      PORT: 3000
    restart: unless-stopped
    depends_on:
      - api-gateway

volumes:
  auth_db_data:
  expense_db_data:
  redis_data:
  rabbitmq_data:
